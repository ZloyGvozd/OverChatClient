<!DOCTYPE html>
<html>
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geologica:wght,CRSV@100..900,0&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Color+Emoji&display=swap" rel="stylesheet">
    <style>
        .msg{
            font-size: 20px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            white-space: pre-wrap;
            overflow-wrap: break-word;
            word-break: break-word;
        }
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: transparent;
            color: white;
            font-family: "Geologica",
            "NotoColorEmoji",
            sans-serif;
            font-optical-sizing: auto;
            font-weight: 300;
            font-style: normal;
            font-variation-settings:
                    "slnt" 0,
                    "CRSV" 0,
                    "SHRP" 0;
        }

        #box {
            position: fixed;
            display: flex;
            gap: 10px;
            bottom: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.5);
            width: 100%;
            height: 60px;
            border-top-right-radius: 0;
            border-bottom-right-radius: 5px;
        }
        #inp{
            width: 100%;
            flex: 1;
            padding: 5px;
            font-size: 20px;
            border-radius: 10px;
            border-width: 0;
            background: rgba(0,0,0,0.7);
            color: #ffffff;
        }
        #chat{
            width: 100%;
            height: calc(100% - 100px);
            background: transparent;
            display: flex;
            flex-direction: column;
        }
        #msgs{
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;

            padding: 0 5px 0 5px;

            white-space: pre-wrap;
            overflow-wrap: break-word;
        }
        #head{
            height: 30px;
            min-height: 30px;
            max-height: 30px;
            overflow: hidden;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            padding: 0 10px;
            text-shadow: 0 0 8px rgba(0,0,0,0.8);
            background: rgba(0,0,0,0.5);
        }
        #head p {
            margin: 0;
            line-height: 30px;
        }
        #msgs::-webkit-scrollbar {
            width: 10px;
        }

        #msgs::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.2);
            border-radius: 4px;
        }

        #msgs::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.15);
            border-radius: 4px;
        }

        #msgs::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.25);
        }
        #msgs.hide-scroll::-webkit-scrollbar {
            display: none;
        }
        img.emoji {
            width: 20px;
            height: 20px;
            vertical-align: middle;
            margin-right: 10px;
        }
        img.emoji:hover {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            margin-right: 10px;
        }
    </style>
</head>
<body>
<div id="chat">
    <div id="msgs"></div>
</div>
<div id="head">
    <!--
    <p>🌍</p>
    <p>🇬🇧</p>
    <p>🇷🇺</p>
    -->
    <p style="color:lawngreen" id="showCurrentOnline">Онлайн: 0</p>
</div>
<div id="box">
    <input type="text" id="inp" placeholder="Написать...">
</div>
<script>
    //настройки
    const serverAddress = "localhost:3000"
    const isUseHttps = false

    //элементы
    const box = document.getElementById("box")
    const inp = document.getElementById("inp")
    const chat = document.getElementById("chat")
    const msgs = document.getElementById("msgs")
    const head = document.getElementById("head")
    const showCurrentOnline = document.getElementById("showCurrentOnline")

    //подготовка
    box.style.display = "none"
    head.style.display = "none"
    msgs.classList.toggle('hide-scroll', true)
    msgs.scrollTop = msgs.scrollHeight

    //источник событий (events)
    const eventSource = new EventSource(`${isUseHttps ? "https" : "http"}://${serverAddress}/events`);
    let token = ""

    //входящее сообщение или эвент
    eventSource.onmessage = (event) => {
        const data = JSON.parse(event.data);
        //обнова счётчика онлайна
        if(data.online){
            showCurrentOnline.textContent = "Онлайн: " + data.online
            return
        }
        //пришёл токен
        if(data.token){
            //console.log(data.token)
            token = data.token
            return;
        }
        //сообщение
        //console.log("Новое сообщение в чате:", data.text);
        addMessage(data.user, data.color, data.text)
    };

    //ошибка подключения, автореконнект происходит сам
    eventSource.onerror = (e) => {
        //console.error("Нет соединения");
    };

    //инфа о пользователе
    let playerInfo = { name: "null", steamID: "null", ready: false };

    //вызываем один раз при загрузке страницы
    window.onload = () => {
        //вызов передачи инфы
        gmod.getPlayerInfo();
    };

    //принятие инфы
    function receivePlayerInfo(data) {
        playerInfo.name = data.name;
        playerInfo.steamID = data.steamid;
        playerInfo.ready = true;
    }

    //функция отправки сообщения
    async function sendMessage(text) {
        if(text.length === 0){
            return
        }
        //проверка наличия инфы
        if (!playerInfo.ready) {
            console.error("Данные игрока не получены!");
            return;
        }

        //отправка сообщения
        const response = await fetch(`${isUseHttps ? "https" : "http"}://${serverAddress}/send`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                user: playerInfo.name,
                steamID: playerInfo.steamID,
                text: text,
                token: token
            })
        });

        //проверка
        if (!response.ok) {
            console.error("Не удалось отправить сообщение");
        }
    }

    //открыто ли окно
    var cOpend = false

    //фикс чего-то
    inp.addEventListener("focus", function() {
        gmod.setInFocus(true)
    });
    inp.addEventListener("blur", function() {
        gmod.setInFocus(false)
    });

    //функция скрытия или открытия окна
    function hideBlock(hide) {
        chat.style.background = hide ? "transparent" : "rgba(0,0,0,0.5)"
        box.style.display = hide ? "none" : "flex"
        head.style.display = hide ? "none" : "flex"
        msgs.classList.toggle('hide-scroll', hide);
        cOpend = !hide
    }

    //отправка по нажатии enter
    document.addEventListener("keydown", function(event) {
        if (event.key === "Enter") {
            sendMessage(inp.value)
            inp.value = ""
        }
    });

    //вывод сообщения в окно
    function addMessage(username, color, text) {
        const isAtBottom = msgs.scrollTop + msgs.clientHeight >= msgs.scrollHeight - 1

        const msgDiv = document.createElement("div");
        msgDiv.classList.add("msg");

        const nameSpan = document.createElement("span");
        nameSpan.style.color = color;
        nameSpan.textContent = username + ": ";

        const textNode = document.createTextNode(text);

        msgDiv.appendChild(nameSpan);
        msgDiv.appendChild(textNode);

        msgs.appendChild(msgDiv);

        //автоскролл
        if (isAtBottom || !cOpend) {
            msgs.scrollTop = msgs.scrollHeight;
        }
    }
</script>
</body>
</html>
